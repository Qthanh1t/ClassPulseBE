spring:
  application:
    name: classpulse

  threads:
    virtual:
      enabled: true  # Java 21 Project Loom virtual threads

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/classpulse}
    username: ${DB_USER:classpulse}
    password: ${DB_PASSWORD:classpulse_dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      client-type: jedis
      jedis:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html
    min-response-size: 1024

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 900        # 15 phút (giây)
  refresh-token-expiry-days: 30

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:classpulse}

logging:
  pattern:
    console: "%d{HH:mm:ss} %-5level [%X{requestId}] %logger{36} - %msg%n"
  level:
    root: WARN
    com.classpulse: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.springframework.security: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
