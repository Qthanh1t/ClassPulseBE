# Coturn TURN/STUN server — dev configuration
# Production: replace static-auth-secret, enable TLS with real certs

listening-port=3478
tls-listening-port=5349

# Relay port range — must match docker-compose ports mapping
min-port=49152
max-port=49200

fingerprint

# HMAC-based time-limited credentials (used by WebRTC ICE servers config)
use-auth-secret
static-auth-secret=classpulse_turn_dev_secret

realm=classpulse.local
server-name=classpulse

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Security
no-loopback-peers
no-multicast-peers

# Dev: disable TLS certificate verification requirements
# Production: remove these and add cert=/path/to/cert.pem + pkey=/path/to/key.pem
no-tls
no-dtls
