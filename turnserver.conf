# Coturn TURN/STUN server — dev configuration
# Production: use use-auth-secret + TLS, generate credentials server-side

listening-port=3478
tls-listening-port=5349

# Relay port range — must match docker-compose ports mapping
min-port=49152
max-port=49200

fingerprint

# Static long-term credentials (matches frontend webrtc.ts: classpulse / secret123)
# Production: switch to use-auth-secret with server-generated HMAC credentials
lt-cred-mech
user=classpulse:secret123

realm=classpulse.local
server-name=classpulse

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Security
no-loopback-peers
no-multicast-peers

# Dev: TLS disabled (no certificates in dev)
# Production: remove these and add cert=/path/to/cert.pem + pkey=/path/to/key.pem
no-tls
no-dtls
